<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind the Gap — Fellowship Line</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-state="map" data-started="false">

  <!-- ── Map layer — always rendered ── -->
  <div id="map-layer">
    <svg id="transit-svg" aria-label="Fellowship Line transit map" xmlns="http://www.w3.org/2000/svg">
      <g id="pan-group">
        <path id="path-dim" class="track track-dim" />
        <path id="path-lit" class="track track-lit" />
        <g id="stations-group"></g>
      </g>
    </svg>
  </div>

  <!-- ── Title screen overlay ── -->
  <div id="title-screen" aria-hidden="true">
    <div class="title-inner">
      <div class="title-tag">Fellowship Line · Spring 2026</div>
      <h1 class="wordmark">Mind the <span class="gap">Gap</span></h1>
      <p class="title-sub">Oussama Ouadani &nbsp;·&nbsp; The Lab @ MassDOT</p>
    </div>
    <!-- Decorative transit lines on title screen -->
    <svg class="title-deco-lines" aria-hidden="true">
      <line class="deco-fellowship" x1="0" y1="70%" x2="100%" y2="70%" />
      <circle class="deco-station fellowship" cx="20%" cy="70%" r="8" />
      <circle class="deco-station fellowship" cx="50%" cy="70%" r="8" />
      <circle class="deco-station fellowship" cx="80%" cy="70%" r="8" />
      <line class="deco-duckling" x1="0" y1="80%" x2="100%" y2="80%" />
      <circle class="deco-station duckling" cx="35%" cy="80%" r="8" />
      <circle class="deco-station duckling" cx="65%" cy="80%" r="8" />
    </svg>
  </div>

  <!-- ── Stop panel (left side card) ── -->
  <aside id="stop-panel" aria-live="polite">

    <div id="panel-scroll">

      <!-- Intro / outro (type: "intro" | "outro") -->
      <div id="panel-intro" class="hidden">
        <div class="panel-tag-row">
          <span class="panel-line-tag">Fellowship Line</span>
        </div>
        <h2 id="intro-title" class="panel-title"></h2>
        <p  id="intro-body"  class="intro-body"></p>
      </div>

      <!-- Regular stop -->
      <div id="panel-regular" class="hidden">
        <div class="panel-tag-row">
          <span id="reg-tag"    class="panel-theme-tag"></span>
          <span id="reg-number" class="panel-stop-num"></span>
        </div>
        <h2 id="reg-title" class="panel-title"></h2>
        <dl id="panel-grid">
          <dt>Context</dt>   <dd id="p-context"></dd>
          <dt>Objective</dt> <dd id="p-obj"></dd>
          <dt>How</dt>       <dd id="p-how"></dd>
          <dt id="p-rlabel">Result</dt>
          <dd id="p-result"></dd>
        </dl>
      </div>

    </div><!-- /panel-scroll -->

    <nav id="panel-nav" aria-label="Stop navigation">
      <button id="btn-prev"     aria-label="Previous stop">←</button>
      <button id="btn-overview" aria-label="Zoom out to full map">−</button>
      <button id="btn-next"     aria-label="Next stop">→</button>
    </nav>

  </aside>

  <!-- ── Map-state controls ── -->
  <div id="map-controls" aria-label="Map controls">
    <!-- Before started: begin button -->
    <button id="btn-begin" aria-label="Begin presentation">→</button>
    <!-- After started: return to stop -->
    <button id="btn-return" aria-label="Return to current stop" class="hidden">+</button>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
